name: 周期股估值自动监控

on:
  schedule:
    # 每天收盘后自动运行（UTC时间10:00 = 北京时间18:00）
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    # 允许在 GitHub 网页上手动触发

permissions:
  contents: write # 必须开启写入权限，否则算出来的表格传不回仓库

jobs:
  monitor_and_log:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: 运行估值监控脚本
      run: |
        python  dynamic-peg.py # ⚠️ 请确保这里的文件名和上面保存的 Python 文件名一致

    - name: 将新生成的表格自动推回仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 💡 暴力修复：不管有没有被屏蔽，先强行加进暂存区！
        git add -f valuation_log.csv
        
        # 然后再判断暂存区里有没有东西
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "🤖 自动更新: 周期股估值数据表格 [$(date +'%Y-%m-%d %H:%M')]"
          git push
          echo "✅ 成功推送最新数据到仓库！"
        else
          echo "🔵 数据未发生变化，或生成失败。"
        fi
