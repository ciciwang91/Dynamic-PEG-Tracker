name: 周期股估值自动监控

on:
  schedule:
    # 对应美东 17:00 (美股已收盘) / 北京时间次日 06:00 / 韩国时间次日 07:00
    - cron: '0 22 * * 1'
  # 保留手动运行按钮，方便你随时测试
  workflow_dispatch:
    # 允许在 GitHub 网页上手动触发

permissions:
  contents: write # 必须开启写入权限，否则算出来的表格传不回仓库

jobs:
  monitor_and_log:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: 运行估值监控脚本
      env:
        TRIGGER_REASON: ${{ github.event_name }} # 👈 告诉 Python 是怎么触发的
      run: |
        python  dynamic-peg.py # ⚠️ 请确保这里的文件名和上面保存的 Python 文件名一致

    - name: 将新生成的表格自动推回仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 💡 防弹逻辑：先检查今天 Python 到底有没有成功生成文件
        if [ -f "valuation_log.csv" ]; then
          git add -f valuation_log.csv
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 自动更新: 周期股估值数据表格 [$(date +'%Y-%m-%d %H:%M')]"
            git push
            echo "✅ 成功推送最新数据到仓库！"
          else
            echo "🔵 数据未发生变化，无需推送。"
          fi
        else
          echo "⚠️ 警告：valuation_log.csv 文件不存在。可能是今天所有数据抓取均失败，跳过上传步骤。"
        fi
